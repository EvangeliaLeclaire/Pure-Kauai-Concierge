openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Pure Kauai Luxury Travel Concierge API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: itineraries
    description: Itinerary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /itineraries:
    post:
      operationId: createItinerary
      tags: [itineraries]
      summary: Generate a new itinerary using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /itineraries/{id}:
    get:
      operationId: getItinerary
      tags: [itineraries]
      summary: Get an itinerary by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /itineraries/{id}/approve:
    post:
      operationId: approveItinerary
      tags: [itineraries]
      summary: Approve an itinerary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ItineraryInput:
      type: object
      required:
        - guestName
        - checkIn
        - checkOut
        - adults
        - children
        - specialOccasion
      properties:
        guestName:
          type: string
        checkIn:
          type: string
        checkOut:
          type: string
        adults:
          type: integer
          minimum: 1
        children:
          type: integer
          minimum: 0
        childrenAges:
          type: ["string", "null"]
        hasPets:
          type: ["boolean", "null"]
        specialOccasion:
          type: string
          enum:
            - None
            - Anniversary
            - Honeymoon
            - Birthday
            - "Vow Renewal"
            - Proposal
            - "Bachelorette or Bachelor Party"
            - Babymoon
            - "Family Reunion"
            - "Friendship Reunion"
            - "Corporate Retreat"
            - "Creative Retreat"
            - "Wellness Retreat"
            - "Celebration of Life"
            - "Milestone — Other"
            - "Just Because"
        occasionDetails:
          type: ["string", "null"]
        occasionDate:
          type: ["string", "null"]
        occasionAcknowledgement:
          type: ["string", "null"]
        specialNotes:
          type: ["string", "null"]
        villaServices:
          type: array
          items:
            type: string
        inVillaExperiences:
          type: array
          items:
            type: string
        excursions:
          type: array
          items:
            type: string
        customRequest:
          type: ["string", "null"]
        hostName:
          type: ["string", "null"]
        hostEmail:
          type: ["string", "null"]
        hostPhone:
          type: ["string", "null"]

    InvoiceItem:
      type: object
      required:
        - name
        - category
        - description
        - pricePerUnit
        - quantity
        - unit
        - totalPrice
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        duration:
          type: ["string", "null"]
        pricePerUnit:
          type: number
        quantity:
          type: number
        unit:
          type: string
        totalPrice:
          type: number
        unsplashKeyword:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    ItineraryActivity:
      type: object
      required:
        - time
        - name
        - description
        - unsplashKeyword
      properties:
        time:
          type: string
        name:
          type: string
        description:
          type: string
        unsplashKeyword:
          type: string
        photoUrl:
          type: ["string", "null"]

    ItineraryDay:
      type: object
      required:
        - dayNumber
        - title
        - theme
        - date
        - activities
      properties:
        dayNumber:
          type: integer
        title:
          type: string
        theme:
          type: string
        date:
          type: string
        activities:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryActivity"

    Itinerary:
      type: object
      required:
        - id
        - guestName
        - checkIn
        - checkOut
        - adults
        - children
        - specialOccasion
        - villaServices
        - inVillaExperiences
        - excursions
        - days
        - inVillaInvoice
        - excursionInvoice
        - approved
        - createdAt
      properties:
        id:
          type: string
        guestName:
          type: string
        checkIn:
          type: string
        checkOut:
          type: string
        adults:
          type: integer
        children:
          type: integer
        childrenAges:
          type: ["string", "null"]
        hasPets:
          type: ["boolean", "null"]
        specialOccasion:
          type: string
        specialNotes:
          type: ["string", "null"]
        villaServices:
          type: array
          items:
            type: string
        inVillaExperiences:
          type: array
          items:
            type: string
        excursions:
          type: array
          items:
            type: string
        customRequest:
          type: ["string", "null"]
        hostName:
          type: ["string", "null"]
        hostEmail:
          type: ["string", "null"]
        hostPhone:
          type: ["string", "null"]
        welcomeMessage:
          type: ["string", "null"]
        days:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryDay"
        inVillaInvoice:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
        excursionInvoice:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
        approved:
          type: boolean
        createdAt:
          type: string
